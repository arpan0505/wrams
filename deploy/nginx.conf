# ============================================================
# Nginx Reverse Proxy Configuration
# ============================================================
# Both services behind a single domain.
#
# Install:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/wrams
#   sudo ln -s /etc/nginx/sites-available/wrams /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# ============================================================

server {
    listen 80;
    server_name your-domain.com;  # Replace with your domain or IP

    # Asset Filter UI (landing page)
    location / {
        proxy_pass http://127.0.0.1:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Vision Player
    location /vision/ {
        rewrite ^/vision/(.*) /$1 break;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Large body for frame uploads
        client_max_body_size 50M;
    }

    # Direct API access to Vision Player
    location /vision/api/ {
        rewrite ^/vision/(.*) /$1 break;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health check
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Logging
    access_log /var/log/nginx/wrams_access.log;
    error_log /var/log/nginx/wrams_error.log;
}

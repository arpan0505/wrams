<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VisionPlayer | Standalone Service</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body>
  <div class="app-container">
    <header class="app-header">
      <h1>Vision<span>Player</span></h1>
      <p>Precision Frame Snatching & SRT Engine (Main Service)</p>
    </header>

    <main class="main-content">
      <!-- Player Section -->
      <section class="player-section glass-panel">
        <div class="controls-overlay" style="display: flex; justify-content: space-between; align-items: center;">
          <div class="left-controls">
            <span id="eid-display" class="badge" style="font-size: 1.1rem; padding: 0.6rem 1.2rem;">E_ID: Pending Video
              Load</span>
          </div>

          <div class="file-inputs">
            <label class="btn-primary">
              <input type="file" id="video-input" accept="video/*" hidden>
              Load Video
            </label>
            <label class="btn-secondary">
              <input type="file" id="srt-input" accept=".srt,.gpx" hidden>
              Load SRT / GPX
            </label>
            <button id="start-btn" class="btn-primary" disabled style="margin-left:auto;">
              ▶ Start Playback
            </button>
            <button id="save-session-btn" class="btn-secondary"
              style="background: var(--accent-color); color: #000; border: none; font-weight: 800;">
              💾 Save Session
            </button>
          </div>
        </div>

        <div class="video-container" id="video-wrapper">
          <video id="main-video" controls preload="metadata"></video>
          <div id="subtitle-display" class="subtitle-overlay"></div>
        </div>

        <!-- Hidden canvas for processing -->
        <canvas id="processing-canvas" hidden></canvas>
      </section>

      <!-- Snatcher Gallery Section -->
      <section class="gallery-section glass-panel">
        <div class="gallery-header">
          <h2>Snatched Frames (Latest 5)</h2>
          <span id="frame-count" class="badge">0 frames</span>
        </div>
        <div class="gallery-grid" id="frames-gallery">
          <!-- Thumbnails will be injected here -->
          <div class="empty-state">
            <p>Play a video to start snapping frames</p>
          </div>
        </div>
      </section>
    </main>
  </div>

  <!-- Review Modal Overlay -->
  <div id="review-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content glass-panel">
      <h2>Session Review</h2>
      <p id="modal-msg">You have captured <span id="modal-frame-count">0</span> frames. Do you want to save them to the
        database?</p>

      <!-- Progress Bar (Hidden by default) -->
      <div id="progress-container" style="display: none; margin-top: 20px;">
        <div class="progress-bar-bg">
          <div id="progress-bar-fill" class="progress-bar-fill"></div>
        </div>
        <p id="progress-text" style="font-size: 0.8rem; color: var(--text-muted); margin-top: 5px;">Saving frames...</p>
      </div>

      <div class="modal-actions">
        <button id="modal-save-btn" class="btn-primary">💾 Save Now</button>
        <button id="modal-cancel-btn" class="btn-secondary">❌ Cancel</button>
      </div>
    </div>
  </div>

  <script type="module" src="src/main.js"></script>
</body>

</html>
